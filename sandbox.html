<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crosstalk Customs</title>

<style>
body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
margin:0;
padding:0;
background:transparent;
}

.card{
background:#ffffff;
border-radius:18px;
padding:28px;
max-width:560px;
margin:0 auto;
position:relative;
box-sizing:border-box;
}

.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:4px;
background:#c9302c;
border-radius:18px 18px 0 0;
}

h2{margin:0 0 16px;font-size:26px;font-weight:700}
p{font-size:14px;opacity:.9;margin:0 0 16px}

label{
display:block;
font-size:12px;
font-weight:700;
margin-top:16px;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:10px 12px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
background:#fafafa;
box-sizing:border-box;
}

textarea{
min-height:80px;
resize:vertical;
font-family:monospace;
}

button{
margin-top:24px;
width:100%;
padding:14px;
border:none;
border-radius:999px;
background:#c9302c;
color:white;
font-weight:700;
font-size:14px;
cursor:pointer;
}

button:hover{background:#a52320}

/* Inline Qobuz link style */
.findTrackBtn{
width:auto !important;
margin-top:0 !important;
padding:4px 6px !important;
border-radius:4px !important;
background:transparent !important;
color:#c9302c !important;
font-weight:600 !important;
font-size:12px !important;
cursor:pointer;
white-space:nowrap;
display:none;
}
</style>
</head>

<body>

<div class="card">

<h2>Start Your Custom Record</h2>

<form id="orderForm">

<input type="hidden" name="Sides" id="sides" value="Double">

<label>Customer Name</label>
<input type="text" name="Customer Name" required>

<label>Email</label>
<input type="email" name="Email" required>

<label>Phone Number</label>
<input type="text" name="Custom Field 1">

<label>Record Size</label>
<select id="size" name="Record Size">
<option value="7">7 inch</option>
<option value="10">10 inch</option>
<option value="12">12 inch</option>
</select>

<label>Playback Speed</label>
<select id="rpm" name="Speed">
<option value="33 RPM">33 RPM</option>
<option value="45 RPM">45 RPM</option>
</select>

<label>Vinyl Colour</label>
<select id="colour">
<option value="Clear">Clear (standard)</option>
<option value="Black">Black (+$10)</option>
<option value="Red">Transparent Red (+$10)</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">

<div class="checkbox-row">
<input type="checkbox" id="designCheck">
<label>Add Printed Jacket + Labels (+$40)</label>
</div>

<p style="font-size:11px;">
Minimum artwork: 1500x1500px. Higher resolution preferred.
<a href="mailto:custom@crosstalkrecords.com">Email us</a> if unsure.
</p>

<div id="priceBox" class="priceBox"></div>

<div id="tracks"></div>
<button type="button" id="addTrackBtn">+ Add Track</button>

<textarea name="Tracklist"></textarea>

<div style="margin-top:14px;font-size:12px;color:#666;">
Cutting will only commence once invoices have been paid in full.
</div>

<button type="submit">Submit Project</button>

</form>

<script>

const retailPrices={
"7":{"Double":85},
"10":{"Double":100},
"12":{"Double":125}
}

function updatePrice(){

let base = retailPrices[size.value]["Double"]
let total = base * qty.value

// colour
if(colour.value !== "Clear"){
total += 10 * qty.value
}

// design
if(document.getElementById("designCheck").checked){
total += 40
}

priceBox.innerHTML = `Estimated total<br>$${total.toFixed(2)}`
}

size.onchange = updatePrice
qty.oninput = updatePrice
colour.onchange = updatePrice
designCheck.onchange = updatePrice

updatePrice()

// TRACK BUILDER

async function searchTracks(query){
const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=5`)
const data = await res.json()
return data.results || []
}

function createTrackRow(){

const row = document.createElement("div")
row.style.display = "flex"
row.style.gap = "6px"

row.innerHTML = `
<input class="trackName">
<input class="duration" placeholder="mm:ss" style="width:70px;">
<button type="button" class="findTrackBtn">Find on Qobuz →</button>
<button type="button" class="remove">×</button>
`

row.querySelector(".remove").onclick = ()=>{
row.remove()
updateTracklist()
}

row.querySelector(".findTrackBtn").onclick = ()=>{
if(row.dataset.qobuz){
window.open(row.dataset.qobuz,"_blank")
}
}

const input = row.querySelector(".trackName")

input.addEventListener("input", async ()=>{

const results = await searchTracks(input.value)

if(results.length){

const t = results[0]

const duration = Math.floor(t.trackTimeMillis/1000)
const min = Math.floor(duration/60)
const sec = duration%60

row.querySelector(".duration").value = `${min}:${sec.toString().padStart(2,'0')}`

const query = encodeURIComponent(t.artistName + " " + t.trackName)
row.dataset.qobuz = `https://www.qobuz.com/au-en/search?q=${query}`

row.querySelector(".findTrackBtn").style.display = "inline-block"

updateTracklist()
}

})

tracks.appendChild(row)
}

function updateTracklist(){
let output=""
document.querySelectorAll(".trackName").forEach(el=>{
if(el.value) output+=el.value+"\n"
})
document.querySelector('textarea[name="Tracklist"]').value = output.trim()
}

addTrackBtn.onclick = createTrackRow
createTrackRow()

</script>

</body>
</html>
